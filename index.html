<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>思维导图生成器 - Mindmap Pro</title>
    
    <script src="./lib/tailwindcss.js"></script>
    <script src="./lib/d3.js"></script>
    <script src="./lib/markmap-lib.js"></script>
    <script src="./lib/markmap-view.js"></script>
    <script src="./lib/opentype.min.js"></script>
    <link rel="stylesheet" href="./style.css">
    <script src="./fonts/config.js"></script>
    <script>
        // 检测到是移动设备或屏幕极窄时，自动重定向到移动端专属页面
        if (/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 768) {
            window.location.replace("mobile.html");
        }
    </script>
    <script>
        const originalWarn = console.warn;
        console.warn = (...args) => { if (args[0] && args[0].includes('cdn.tailwindcss.com')) return; originalWarn(...args); };
    </script>
</head>
<body class="bg-slate-50 text-slate-800 h-screen w-screen flex flex-col overflow-hidden font-sans relative">

    <header class="bg-white border-b border-slate-200 h-14 md:h-16 flex items-center justify-between px-4 md:px-6 shrink-0 shadow-sm z-20 relative select-none">
        <div class="flex items-center gap-3" id="drag-area" style="flex:1; height:100%;" onpointerdown="if(event.target === this || event.target.tagName==='H1') { window.NativeHost?.dragWindow(); }">
            <button id="desktop-toggle-btn" class="flex items-center gap-1 px-3 py-1.5 text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-md transition duration-200">
                </button>
            <div class="w-px h-6 bg-slate-200 mx-1 hidden md:block"></div>
            <h1 class="text-lg md:text-xl font-bold text-slate-800 tracking-tight hidden sm:block pointer-events-none">Mindmap Pro <span class="text-[11px] text-blue-600 font-normal ml-1 border border-blue-200 bg-blue-50 px-1 py-0.5 rounded">Native Client</span></h1>
        </div>
        
        <div class="flex items-center gap-2 md:gap-3">
            <div class="relative group">
                <button class="px-3 md:px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md transition duration-200 flex items-center gap-1 shadow-md">
                    ⬇️ <span class="hidden sm:inline">导出工具</span> <span class="text-[10px] ml-0.5">▼</span>
                </button>
                <div class="absolute right-0 top-full pt-2 w-36 hidden group-hover:block z-50">
                    <div class="bg-white border border-slate-200 rounded-md shadow-lg overflow-hidden">
                        <button id="btn-export-svg" class="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-100 hover:text-blue-600 font-medium">✨ SVG 矢量图</button>
                        <div class="h-px bg-slate-100 w-full"></div>
                        <button id="btn-export-png" class="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-100 hover:text-blue-600 font-medium">📸 PNG 高清图</button>
                    </div>
                </div>
            </div>
            
            <!-- 原生窗口控制按钮 (Windows 风格) -->
            <div class="flex h-full items-center ml-2 border-l border-slate-200 pl-2">
                <button onclick="window.NativeHost?.minimize()" class="w-9 h-9 flex items-center justify-center text-slate-500 hover:bg-slate-100 rounded transition" title="最小化">
                    <svg width="12" height="1" viewBox="0 0 12 1" fill="currentColor"><rect width="12" height="1"/></svg>
                </button>
                <button onclick="window.NativeHost?.maximize()" class="w-9 h-9 flex items-center justify-center text-slate-500 hover:bg-slate-100 rounded transition" title="最大化">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor"><rect x="0.5" y="0.5" width="9" height="9"/></svg>
                </button>
                <button onclick="window.NativeHost?.close()" class="w-9 h-9 flex items-center justify-center text-slate-500 hover:bg-red-500 hover:text-white rounded transition" title="关闭">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor"><path d="M1 1l8 8M9 1L1 9"/></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <aside id="editor-container" class="bg-slate-900 flex flex-col shrink-0 transition-all duration-300 z-10 shadow-lg overflow-hidden">
            <div class="flex items-center px-4 h-10 md:h-12 bg-slate-800/50 border-b border-slate-800/80 select-none shrink-0">
                <div class="flex items-center gap-2 text-slate-400 text-sm font-medium">
                    <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                    <span>Markdown 数据区</span>
                </div>
            </div>
            
            <div class="flex-1 relative">
                <textarea id="editor" class="absolute inset-0 w-full h-full p-4 md:p-5 bg-transparent text-slate-300 font-mono text-[14px] leading-relaxed resize-none outline-none focus:ring-0 custom-editor-scrollbar" spellcheck="false"></textarea>
            </div>

            <div class="hidden md:flex h-8 bg-slate-900 border-t border-slate-800/80 items-center justify-between px-4 shrink-0 text-[11px] text-slate-500 select-none">
                <span>© Mindmap Pro · Local First</span>
                <span class="flex gap-2" title="本软件底层渲染技术致谢">
                    <span>Powered by Markmap & D3.js</span>
                </span>
            </div>
        </aside>

        <section class="flex-1 flex flex-col relative bg-slate-50 w-full h-full">
            <div id="export-zone" class="markmap-container flex-1 w-full h-full cursor-grab active:cursor-grabbing">
                <svg id="markmap" class="w-full h-full"></svg>
            </div>
            
            <input type="text" id="floating-input" autocomplete="off">
            
            <div id="node-toolbar">
                <div class="radial-item item-1"><button class="radial-btn" id="btn-edit" title="编辑文字 (F2)">✎</button></div>
                <div class="radial-item item-2"><button class="radial-btn" id="btn-add-sibling" title="新增同级 (Enter)">➕</button></div>
                <div class="radial-item item-3"><button class="radial-btn" id="btn-add-child" title="新增次级 (Tab)">✨</button></div>
                <div class="radial-item item-4"><button class="radial-btn danger" id="btn-delete" title="删除 (Del)">🗑</button></div>
            </div>

            <div class="absolute bottom-6 right-4 md:right-6 flex items-center bg-white rounded-lg shadow-lg border border-slate-200 p-1 md:p-1.5 z-40">
                <div class="relative group">
                    <button class="p-1.5 md:p-2 text-slate-500 hover:text-blue-600 hover:bg-slate-100 rounded-md transition flex items-center justify-center" title="全局外观设置">
                        <span class="font-serif font-bold text-[14px] leading-none">Aa</span>
                    </button>
                    <div class="absolute bottom-full right-0 pb-2 w-56 hidden group-hover:block z-50">
                        <div class="bg-white border border-slate-200 rounded-lg shadow-2xl p-4 transform origin-bottom-right">
                            <div class="mb-4">
                                <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wider">全局字体 (Font)</label>
                                <select id="config-font-family" class="w-full text-sm text-slate-700 bg-slate-50 border border-slate-200 rounded-md outline-none p-1.5 focus:border-blue-500 transition cursor-pointer">
                                    <option value='"PingFang SC", "Microsoft YaHei", sans-serif'>默认无衬线 (Sans)</option>
                                    <option value='"Noto Serif SC", "SimSun", serif'>宋体/衬线 (Serif)</option>
                                    <option value='"KaiTi", "Kaiti SC", serif'>优雅楷体 (KaiTi)</option>
                                    <option value='Consolas, monospace'>极客等宽 (Mono)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wider">基础字号: <span id="config-font-size-val" class="text-blue-600 font-bold">15px</span></label>
                                <input type="range" id="config-font-size" min="12" max="24" step="1" value="15" class="w-full cursor-pointer">
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="w-px h-5 bg-slate-200 mx-0.5 md:mx-1"></div>
                <button id="btn-undo" class="p-1.5 md:p-2 text-slate-500 hover:text-blue-600 hover:bg-slate-100 rounded-md transition" title="撤回 (Ctrl+Z)">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>
                </button>
                <div class="w-px h-5 bg-slate-200 mx-0.5 md:mx-1"></div>
                <button id="btn-zoom-in" class="p-1.5 md:p-2 text-slate-500 hover:text-blue-600 hover:bg-slate-100 rounded-md transition" title="放大">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                </button>
                <button id="btn-zoom-out" class="p-1.5 md:p-2 text-slate-500 hover:text-blue-600 hover:bg-slate-100 rounded-md transition" title="缩小">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"></path></svg>
                </button>
                <button id="btn-fit" class="p-1.5 md:p-2 text-slate-500 hover:text-blue-600 hover:bg-slate-100 rounded-md transition" title="居中适应">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                </button>
                
                <div class="w-px h-5 bg-slate-200 mx-0.5 md:mx-1 hidden sm:block"></div>
                <button id="toggle-mode-btn" class="hidden sm:flex px-2 md:px-3 py-1.5 text-sm font-bold text-blue-600 hover:bg-slate-100 rounded-md transition items-center gap-1">
                    🔓 编辑模式
                </button>
                
                <div class="w-px h-5 bg-slate-200 mx-0.5 md:mx-1"></div>
                <button id="btn-help" class="p-1.5 md:p-2 text-slate-500 hover:text-blue-600 hover:bg-slate-100 rounded-md transition" title="使用说明与免责声明">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </button>
            </div>
        </section>
    </main>

    <div id="prompt-modal" class="hidden fixed inset-0 bg-slate-900/40 z-[100] flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-[90%] md:w-80 transform transition-all scale-100">
            <h3 id="prompt-title" class="text-lg font-bold text-slate-800 mb-4">新增节点</h3>
            <input type="text" id="prompt-input" class="w-full border border-slate-300 rounded-md px-3 py-2 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 mb-5" placeholder="请输入节点文本...">
            <div class="flex justify-end gap-3">
                <button id="prompt-cancel" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-md transition">取消</button>
                <button id="prompt-confirm" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md transition">确认添加</button>
            </div>
        </div>
    </div>

    <script src="./main.js" defer></script>
</body>
</html>
